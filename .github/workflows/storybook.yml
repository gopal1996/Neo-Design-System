name: Storybook — Build & Deploy

on:
  push:
    branches: [main]
    paths:
      - 'design-system/**'
      - 'mobile/src/**'
      - 'mobile/.storybook/**'
      - '.github/workflows/storybook.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-web:
    name: Build Web Storybook
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: design-system

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: design-system/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook -- --output-dir ../gh-pages/web
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-web
          path: gh-pages/web

  build-mobile:
    name: Build Mobile Storybook
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Storybook
        run: npm run build-storybook -- --output-dir ../gh-pages/mobile
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload mobile artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-mobile
          path: gh-pages/mobile

  deploy:
    name: Deploy to GitHub Pages
    needs: [build-web, build-mobile]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download web artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-web
          path: dist/web

      - name: Download mobile artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-mobile
          path: dist/mobile

      - name: Create root index
        run: |
          cat > dist/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Neo Design System — Storybook</title>
            <style>
              * { box-sizing: border-box; margin: 0; padding: 0; }
              body { background: #000; color: #F0F0F8; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
              .wrap { text-align: center; }
              h1 { font-size: 2rem; font-weight: 700; margin-bottom: 8px; background: linear-gradient(135deg, #A78BFA, #DDD6FE); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
              p { color: #9898B3; margin-bottom: 40px; }
              .cards { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
              a { display: block; padding: 24px 40px; background: #0F0F1A; border: 1px solid #2C2C4A; border-radius: 12px; color: #F0F0F8; text-decoration: none; font-size: 1rem; font-weight: 600; transition: border-color 0.15s, box-shadow 0.15s; }
              a:hover { border-color: #7C3AED; box-shadow: 0 0 20px rgba(124,58,237,0.4); }
              a span { display: block; font-size: 0.8rem; color: #9898B3; font-weight: 400; margin-top: 4px; }
            </style>
          </head>
          <body>
            <div class="wrap">
              <h1>Neo Design System</h1>
              <p>Black &amp; Violet · Dark-only · Modern SaaS</p>
              <div class="cards">
                <a href="./web/">
                  Web Components
                  <span>React · Tailwind</span>
                </a>
                <a href="./mobile/">
                  Mobile Components
                  <span>React Native · Expo</span>
                </a>
              </div>
            </div>
          </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
